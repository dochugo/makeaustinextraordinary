<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Make Austin Extraordinary — the film</title>
<style>
@font-face{font-family:'Space Grotesk';font-style:normal;font-weight:300 700;font-display:swap;src:url(fonts/space-grotesk.woff2) format('woff2')}
@font-face{font-family:'EB Garamond';font-style:normal;font-weight:400 600;font-display:swap;src:url(fonts/eb-garamond.woff2) format('woff2')}
@font-face{font-family:'EB Garamond';font-style:italic;font-weight:400 600;font-display:swap;src:url(fonts/eb-garamond-italic.woff2) format('woff2')}
:root{ --space:#05070f; --pale:#8fb8de; --pale-2:#a9cbe9; --gold:#e9c98a; --ink:#e7eefb; --muted:#8a95ad;
  --serif:'EB Garamond',Georgia,serif; --sans:'Space Grotesk',system-ui,sans-serif; }
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; background:var(--space); overflow:hidden; }
body{ font-family:var(--sans); color:var(--ink); }
canvas#stars{ position:fixed; inset:0; width:100%; height:100%; display:block; z-index:0; }

.beat{ position:fixed; inset:0; opacity:0; transition:opacity 1.1s ease; will-change:opacity; z-index:1; }
.beat.on{ opacity:1; }

/* b1 — the pale blue dot */
.b1 .dot{ position:absolute; left:50%; top:50%; width:10px; height:10px; border-radius:50%;
  background:radial-gradient(circle,#dff0ff, var(--pale) 45%, rgba(80,130,180,.2) 70%, transparent);
  box-shadow:0 0 44px 13px rgba(143,184,222,.55); transform:translate(-50%,-50%) scale(.7); }
.b1.on .dot{ animation:push 6s ease-out forwards; }
@keyframes push{ from{ transform:translate(-50%,-50%) scale(.5); } to{ transform:translate(-50%,-50%) scale(1.8); } }

/* b2 — migration toward Austin */
.b2 .earth{ position:absolute; left:50%; top:50%; width:min(46vmin,380px); aspect-ratio:1; border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle at 38% 34%, #12324e, #071726 62%, #03080e 100%);
  box-shadow: inset -18px -12px 60px rgba(0,0,0,.7), 0 0 70px rgba(60,110,160,.25); }
.b2 .austin{ position:absolute; left:58%; top:57%; width:9px; height:9px; border-radius:50%;
  background:#ffe6b0; box-shadow:0 0 26px 9px rgba(233,201,138,.85); }
.particle{ position:absolute; width:3px; height:3px; border-radius:50%; background:#cfe6ff;
  box-shadow:0 0 8px 2px rgba(143,184,222,.7); opacity:0; }
.b2.on .particle{ animation:stream var(--d,4s) ease-in var(--delay,0s) infinite; }
@keyframes stream{ 0%{ opacity:0; transform:translate(0,0) scale(1);} 12%{opacity:1;}
  100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(.4);} }

/* b3 — the faces (warm points of light) */
.bokeh{ position:absolute; border-radius:50%; filter:blur(1px); opacity:0; }
.b3.on .bokeh{ animation:breathe 4s ease-in-out var(--delay,0s) infinite; }
@keyframes breathe{ 0%,100%{opacity:.18; transform:scale(.9);} 50%{opacity:.85; transform:scale(1.08);} }

/* b4 — Austin, gold hour */
.b4{ background:linear-gradient(180deg,#0a1220 0%, #26304a 34%, #7d6a4f 66%, #e9b874 88%, #f4d79a 100%); }
.b4 .sun{ position:absolute; left:50%; bottom:16%; width:240px; height:240px; transform:translateX(-50%);
  background:radial-gradient(circle,#fff2cf, rgba(244,215,154,.5) 40%, transparent 66%); }
.b4 .skyline{ position:absolute; left:0; right:0; bottom:0; height:26%; }
.b4 .water{ position:absolute; left:0; right:0; bottom:0; height:12%;
  background:linear-gradient(180deg, rgba(255,235,190,.25), rgba(20,30,50,.5)); filter:blur(.5px); }
.bat{ position:absolute; width:6px; height:6px; color:#20161a; opacity:0; font-size:12px; line-height:1; }
.b4.on .bat{ animation:rise 5s linear var(--delay,0s) infinite; }
@keyframes rise{ 0%{opacity:0; transform:translateY(0) rotate(0);} 15%{opacity:.8;}
  100%{opacity:0; transform:translateY(-70vh) translateX(var(--tx,20px)) rotate(8deg);} }

/* b5 — belonging */
.b5 .p{ position:absolute; top:50%; width:12px; height:12px; border-radius:50%; background:#fff2cf;
  box-shadow:0 0 22px 7px rgba(233,201,138,.7); transform:translateY(-50%); }
.b5 .pL{ left:38%; } .b5 .pR{ left:62%; }
.b5.on .pL{ animation:toC 3s ease-in-out forwards; } .b5.on .pR{ animation:toC2 3s ease-in-out forwards; }
@keyframes toC{ to{ left:50%; } } @keyframes toC2{ to{ left:50%; } }
.b5 .ring{ position:absolute; left:50%; top:50%; width:20px; height:20px; border-radius:50%;
  border:1px solid rgba(233,201,138,.6); transform:translate(-50%,-50%) scale(0); opacity:0; }
.b5.on .ring{ animation:ripple 2.4s ease-out 1.2s forwards; }
@keyframes ripple{ 0%{opacity:.7; transform:translate(-50%,-50%) scale(0);} 100%{opacity:0; transform:translate(-50%,-50%) scale(28);} }

/* b6 — the resolve (persists) */
.b6 .wrap{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.6rem; padding:2rem; }
.b6 svg.mark{ width:96px; height:96px; filter:drop-shadow(0 0 .6rem rgba(233,201,138,.5)); }
.b6 .word{ font-family:var(--serif); font-size:clamp(1.7rem,5vw,3rem); letter-spacing:.02em; color:#f3e6c9; text-align:center; opacity:0; transform:translateY(8px); }
.b6.on .word{ animation:up 1.3s ease-out .4s forwards; }
.b6 .max{ font-family:var(--sans); letter-spacing:.5em; font-size:.72rem; color:var(--gold); opacity:0; }
.b6.on .max{ animation:up 1.3s ease-out .8s forwards; }
.b6 .cta{ margin-top:.8rem; font-family:var(--sans); font-size:.72rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
  color:#04060e; background:linear-gradient(120deg,var(--pale-2),var(--pale)); border-radius:999px; padding:.9rem 1.8rem;
  text-decoration:none; opacity:0; transition:box-shadow .35s, transform .35s; }
.b6.on .cta{ animation:up 1.3s ease-out 1.2s forwards; }
.b6 .cta:hover{ box-shadow:0 0 2.4rem rgba(143,184,222,.5); transform:translateY(-2px); }
@keyframes up{ to{ opacity:1; transform:none; } }

/* caption */
#cap{ position:fixed; left:50%; bottom:12vh; transform:translateX(-50%); width:min(84vw,720px); z-index:3;
  font-family:var(--serif); font-size:clamp(1.15rem,2.6vw,1.7rem); line-height:1.5; text-align:center; color:#eaf1fb;
  text-shadow:0 2px 24px rgba(0,0,0,.85); opacity:0; transition:opacity .9s ease; }
#cap.show{ opacity:1; }
#cap em{ color:var(--gold); font-style:italic; }

#bar{ position:fixed; left:0; top:0; height:2px; width:0; background:linear-gradient(90deg,var(--pale),var(--gold)); z-index:4; transition:width .12s linear; }
#replay{ position:fixed; right:14px; bottom:12px; z-index:5; font:inherit; font-size:.72rem; color:#cbd8e8;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:.4rem .9rem; cursor:pointer;
  backdrop-filter:blur(6px); opacity:0; transition:opacity .6s; }
#replay.show{ opacity:.8; }
#replay:hover{ opacity:1; }
@media (prefers-reduced-motion:reduce){ .beat,*{ animation:none!important; } .beat{ transition:opacity .3s!important; } }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<section class="beat b1"><div class="dot"></div></section>
<section class="beat b2"><div class="earth"></div><div class="austin"></div></section>
<section class="beat b3"></section>
<section class="beat b4"><div class="sun"></div>
  <svg class="skyline" viewBox="0 0 100 26" preserveAspectRatio="none"><path fill="#141b28"
    d="M0 26 V16 h4 v-4 h3 v6 h5 v-9 h2 v9 h6 v-5 h4 v5 h5 v-12 h2 v12 h6 v-6 h5 v6 h6 v-8 h2 v8 h7 v-4 h4 v4 h6 v-10 h2 v10 h8 v-5 h4 v5 h100 V26 Z"/></svg>
  <div class="water"></div></section>
<section class="beat b5"><div class="p pL"></div><div class="p pR"></div><div class="ring"></div></section>
<section class="beat b6"><div class="wrap">
  <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
    <defs>
      <linearGradient id="yg" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#c79a4e"/><stop offset=".5" stop-color="#e9c98a"/><stop offset="1" stop-color="#fff3d8"/></linearGradient>
      <linearGradient id="yn" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#bcd7ef"/><stop offset="1" stop-color="#6f9bc4"/></linearGradient>
    </defs>
    <path d="M10 26 C 30 52, 44 62, 92 70" stroke="url(#yn)" stroke-width="6.4" stroke-linecap="round" fill="none" opacity=".95"/>
    <path d="M12 88 C 40 84, 58 60, 94 6" stroke="url(#yg)" stroke-width="7.6" stroke-linecap="round" fill="none"/>
  </svg>
  <div class="word">Make Austin Extraordinary</div>
  <div class="max">M A X</div>
  <a class="cta" href="https://x.com" target="_blank" rel="noopener">Follow us</a>
</div></section>
<div id="cap"></div>
<div id="bar"></div>
<button id="replay" aria-label="Replay the film">↻ Replay</button>

<script>
const cv=document.getElementById('stars'), cx=cv.getContext('2d'); let stars=[];
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
function resize(){ cv.width=innerWidth; cv.height=innerHeight;
  stars=Array.from({length:Math.round(innerWidth*innerHeight/6000)},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.2+.2,t:Math.random()*6.28,s:Math.random()*.9+.2})); }
resize(); addEventListener('resize',resize);
function twinkle(ms){ cx.clearRect(0,0,cv.width,cv.height);
  for(const st of stars){ const a=.35+.45*Math.sin(st.t+ms/900*st.s); cx.globalAlpha=Math.max(0,a);
    cx.fillStyle='#cfe0f2'; cx.beginPath(); cx.arc(st.x,st.y,st.r,0,6.28); cx.fill(); } cx.globalAlpha=1; }

const beats=[
 {t:0,    text:'From out here, at the edge of the dark, the Earth is a single blue point of light — <em>a mote of dust, suspended in a sunbeam.</em>'},
 {t:5000, text:'From the coasts, from across the oceans, points of light are moving — drawn, as if by a quiet gravity, toward <em>one bend in one green river.</em>'},
 {t:11000,text:'They are people. Each one a whole universe of memory and longing — come to build a life among strangers who will not stay strangers for long.'},
 {t:16000,text:'Its warm spring water and its wild bats, its music spilling into the street, its <em>hills going gold at the end of the day.</em>'},
 {t:22000,text:'What we are really seeking is older than any city: to make something together that will outlast us. <em>To belong.</em>'},
 {t:25000,text:'You hold the keys to the future. Now is the time. <em>Let us make Austin extraordinary.</em>'},
];
const TOTAL=29500;
const cap=document.getElementById('cap'), bar=document.getElementById('bar'), replay=document.getElementById('replay');
let start=null, cur=-1, done=false;

function spawn(){
  const b2=document.querySelector('.b2');
  for(let i=0;i<14;i++){ const p=document.createElement('div'); p.className='particle';
    const ang=Math.random()*6.28, rad=Math.max(innerWidth,innerHeight)*.6;
    p.style.left=(58 - Math.cos(ang)*rad/innerWidth*100)+'%'; p.style.top=(57 - Math.sin(ang)*rad/innerHeight*100)+'%';
    p.style.setProperty('--tx',(Math.cos(ang)*rad)+'px'); p.style.setProperty('--ty',(Math.sin(ang)*rad)+'px');
    p.style.setProperty('--d',(3+Math.random()*3)+'s'); p.style.setProperty('--delay',(Math.random()*3)+'s'); b2.appendChild(p); }
  const b3=document.querySelector('.b3'); const warm=['#e9c98a','#e6a15c','#f2d6a0','#d98d6a','#f4c98f'];
  for(let i=0;i<12;i++){ const d=document.createElement('div'); d.className='bokeh';
    const s=40+Math.random()*90; d.style.width=d.style.height=s+'px';
    d.style.left=(10+Math.random()*80)+'%'; d.style.top=(18+Math.random()*60)+'%';
    d.style.background='radial-gradient(circle,'+warm[i%5]+',transparent 70%)'; d.style.setProperty('--delay',(Math.random()*3)+'s'); b3.appendChild(d); }
  const b4=document.querySelector('.b4');
  for(let i=0;i<10;i++){ const b=document.createElement('div'); b.className='bat'; b.textContent='ᨑ';
    b.style.left=(20+Math.random()*60)+'%'; b.style.bottom='30%'; b.style.setProperty('--tx',((Math.random()-.5)*120)+'px');
    b.style.setProperty('--delay',(Math.random()*4)+'s'); b4.appendChild(b); }
}
spawn();

function setBeat(i){ if(i===cur) return; cur=i;
  document.querySelectorAll('.beat').forEach((b,idx)=>b.classList.toggle('on',idx===i));
  cap.classList.remove('show');
  setTimeout(()=>{ cap.innerHTML=beats[i].text; cap.classList.add('show'); }, 260); }

function frame(ts){ if(start===null) start=ts; const ms=ts-start; twinkle(ms);
  let idx=0; for(let k=0;k<beats.length;k++){ if(ms>=beats[k].t) idx=k; }
  setBeat(idx); bar.style.width=Math.min(100, ms/TOTAL*100)+'%';
  if(ms>=TOTAL && !done){ done=true; replay.classList.add('show'); cap.classList.remove('show'); }
  requestAnimationFrame(frame); }

function play(){ start=null; cur=-1; done=false; replay.classList.remove('show');
  if(reduce){ setBeat(5); bar.style.width='100%'; replay.classList.add('show'); twinkle(0); return; }
  requestAnimationFrame(frame); }
replay.onclick=play;
play();
</script>
</body>
</html>
